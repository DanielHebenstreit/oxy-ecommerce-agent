services:
  postgres:
    image: postgres:18-alpine
    container_name: oxy-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./init:/docker-entrypoint-initdb.d
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  oxy:
    image: ghcr.io/oxy-hq/oxy:latest
    container_name: oxy-demo
    working_dir: /workspace
    ports:
      - "3000:3000"
    volumes:
      - ./project:/workspace
      - oxy-state:/var/lib/oxy/data
    environment:
      OXY_STATE_DIR: /var/lib/oxy/data
      OXY_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_DATABASE}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    command: ["oxy", "serve", "--local", "--host", "0.0.0.0", "--port", "3000"]
    restart: unless-stopped

volumes:
  postgres-data:
  oxy-state: